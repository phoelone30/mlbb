<!doctype html>
<html lang="my">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>MLBB Diamond Shop</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="video-banner">

    <video autoplay muted loop playsinline>
      <source src="img/banner.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="overlay-text">
      <h1>MLBB DIAMOND SHOP</h1>
      <p>Fast Top Up • Trusted Service</p>
    </div>

  </div>

  <div class="container">

    <div class="title-box">
      <h2>Mobile Legends Diamond Top Up</h2>
      <p>Fill Your Player ID & Upload Payment Slip</p>
    </div>

    <form id="orderForm">

      <label>
        Player ID
        <input
          id="playerId"
          name="playerId"
          placeholder="Enter Your MLBB Player ID & Server ID"
          required>
      </label>
      
      <label>
        Select Product

        <select id="amountUc" name="amountUc">

          <option value="weeklypass">
            Weekly Pass - 6,300 MMK
          </option>

          <option value="eliteweekly">
            Elite Weekly Pass - 3,300 MMK
          </option>

          <option value="epicmonthly">
            Epic Monthly Pass - 16,600 MMK
          </option>

          <option value="50">
            50+50 Diamonds - 3,250 MMK
          </option>

          <option value="150">
            150+150 Diamonds - 9,700 MMK
          </option>

          <option value="250">
            250+250 Diamonds - 15,600 MMK
          </option>

          <option value="500">
            500+500 Diamonds - 32,000 MMK
          </option>

          <!-- NORMAL DIAMOND -->

          <option value="86">86 Diamonds</option>
          <option value="172">172 Diamonds</option>
          <option value="257">257 Diamonds</option>
          <option value="344">344 Diamonds</option>
          <option value="429">429 Diamonds</option>
          <option value="514">514 Diamonds</option>
          <option value="706">706 Diamonds</option>
          <option value="878">878 Diamonds</option>
          <option value="963">963 Diamonds</option>
        </select>
      </label>

      <div class="price-box">
        Price :
        <span id="priceK"></span>
      </div>

      <div class="pay-box">

        <h3>Payment Accounts</h3>

        <div class="pay-item">
          <strong>KPay</strong><br>
          09407765820<br>
          SoeOoMaung
        </div>

        <div class="pay-item">
          <strong>WavePay</strong><br>
          09661655993<br>
          KyawThetPaingSoe
        </div>

      </div>

      <label>
        Upload Payment Slip

        <input
          type="file"
          id="slip"
          name="slip"
          accept="image/*"
          required>
      </label>

      <button type="submit">
        Submit Order
      </button>
    </form>

    <div id="msg"></div>

  </div>

<script>

const rates = {

  weeklypass: 6300,
  eliteweekly: 3300,
  epicmonthly: 16600,

  "50": 3250,
  "150": 9700,
  "250": 15600,
  "500": 32000,

  // NORMAL DIAMOND
    86: 3500,
    172: 7000,
    257: 10500,
    344: 14000,
    429: 17500,
    514: 21000,
    706: 28500,
    878: 35000,
    963: 38500

};

const sel = document.getElementById('amountUc');
const priceEl = document.getElementById('priceK');

function updatePrice() {

  priceEl.textContent =
  rates[sel.value].toLocaleString() + ' MMK';

}

sel.addEventListener('change', updatePrice);

updatePrice();

// SUBMIT
    document.getElementById('orderForm')
    .addEventListener('submit', async (e)=>{

      e.preventDefault();

      const playerId =
        document.getElementById('playerId')
        .value.trim();

      const serverId =
        document.getElementById('serverId')
        .value.trim();

      const amountUc =
        document.getElementById('amountUc')
        .value;

      const slip =
        document.getElementById('slip')
        .files[0];

      if(!playerId || !slip) {
        return alert('Please fill all fields');
      }

      const amountK = rates[amountUc] || 0;

      const fd = new FormData();

      fd.append('playerId', playerId);
      fd.append('serverId', serverId);
      fd.append('amountUc', amountUc);
      fd.append('amountK', amountK);
      fd.append('slip', slip);

      document.getElementById('msg')
      .textContent = 'Uploading...';

      try {

        const resp = await fetch(
          'https://gsd-drx9.onrender.com/order',
          {
            method: 'POST',
            body: fd
          }
        );

        const data = await resp.json();

        if(data.ok){

          document.getElementById('msg')
          .innerHTML =
          '✅ Order Submitted<br>Order ID : ' +
          data.order.id;

          document.getElementById('orderForm')
          .reset();

          updatePrice();

        } else {

          document.getElementById('msg')
          .textContent =
          'Error : ' +
          (data.error || 'unknown');

        }

      } catch(err){

        document.getElementById('msg')
        .textContent =
        'Upload Failed : ' + err.message;

      }

    });

</script>

</body>
</html>
